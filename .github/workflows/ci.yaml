name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Go)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    name: Build Plugin
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build protoc-gen-mcp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-s -w" -o /dev/null ./plugin/cmd/protoc-gen-mcp/

  test:
    name: Test (Go)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test all modules
        run: |
          go test ./...
          cd plugin && go test ./...
          cd ../examples && go test ./...

  bazel:
    name: Build & Test (Bazel)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          # Cache the bazelisk download, the repository cache (external deps),
          # and the disk cache (build outputs) keyed per workflow.
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      # CI runners ship the Android SDK (ANDROID_HOME set), which activates the
      # transitive android_sdk_repository_extension. On Bazel 8+ that extension
      # references the removed @local_config_platform and breaks toolchain
      # resolution. Clear ANDROID_HOME so the extension stays a no-op stub,
      # matching the committed MODULE.bazel.lock (generated without an SDK).
      - name: Bazel build
        run: bazel build //... --repo_env=ANDROID_HOME=
      - name: Bazel test
        run: bazel test //... --repo_env=ANDROID_HOME= --test_output=errors

  python:
    name: Check (Python)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install & verify imports
        working-directory: examples/python
        run: |
          uv sync
          uv run python -c "
          import sys, os
          sys.path.insert(0, os.path.join('..', 'proto', 'generated', 'python'))
          from todo.v1.todo_service_pb2_mcp import register_todo_service_mcp_handler
          print('Python generated code imports OK')
          "
      - name: Run smoke test
        working-directory: examples/python
        run: uv run python -m pytest smoke_test.py -v

  rust:
    name: Check (Rust)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Cargo check
        working-directory: examples/rust
        run: cargo check --all-targets

  proto-python:
    name: Check proto lib (Python)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          python-version: '3.12'
      - name: Build & verify imports
        working-directory: mcp/protobuf/python
        run: |
          pip install .
          python -c "
          from mcp.protobuf import annotations_pb2
          from mcp.protobuf import app_pb2
          from mcp.protobuf import prompt_pb2
          from mcp.protobuf import elicitation_pb2
          from mcp.protobuf import resource_pb2
          from mcp.protobuf import field_type_pb2
          from mcp.protobuf import mime_type_pb2
          from mcp.protobuf import service_options_pb2
          print('All mcp.protobuf imports OK')
          "

  proto-rust:
    name: Check proto lib (Rust)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Cargo check
        working-directory: mcp/protobuf/rust
        run: cargo check
