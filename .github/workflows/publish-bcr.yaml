name: Publish to BCR

# Publishes a Bazel module entry to the Bazel Central Registry whenever a
# GitHub release is published (the Release workflow creates a non-draft
# release, which fires this). Can also be run manually for a given tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish to the BCR (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  publish:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.3.0
    permissions:
      attestations: write
      contents: write
      id-token: write
    with:
      tag_name: ${{ inputs.tag_name || github.event.release.tag_name }}
      # Fork of bazelbuild/bazel-central-registry that the PR is pushed from.
      # Create this fork once under the org before the first release.
      registry_fork: machanirobotics/bazel-central-registry
      # Attestations require the source archive as a release asset uploaded in
      # the same run. The Release workflow uploads only binaries, so disable
      # for now; enable once a source archive is attached to the release.
      attest: false
    secrets:
      # Classic PAT with `repo` + `workflow` scopes, stored as a repo/org secret.
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
