name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate tag matches semver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag $TAG does not match semver pattern v*.*.*"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          go test -race ./...
          cd plugin && go test -race ./...
          cd ../examples && go test -race ./...

      - name: Setup Buf CLI
        uses: bufbuild/buf-setup-action@v1

      - name: Push proto module to BSR
        run: cd proto && buf push --label "$VERSION"
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}

      # GoReleaser builds the cross-platform binaries + archives + checksums,
      # creates the GitHub Release (notes from the git log per .goreleaser.yaml),
      # and publishes the Homebrew cask to the-protobuf-project/homebrew-tap.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
