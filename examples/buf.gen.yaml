version: v2
# Single input (no paths) ensures strategy:all gets one plugin invocation with all files.
inputs:
  - directory: proto
plugins:
  # --- Go ---
  - local: protoc-gen-go
    out: proto/generated/go
    opt:
      - module=github.com/the-protobuf-project/grpc-mcp-gateway/examples/proto/generated/go
  - local: protoc-gen-go-grpc
    out: proto/generated/go
    opt:
      - module=github.com/the-protobuf-project/grpc-mcp-gateway/examples/proto/generated/go
  - local: protoc-gen-mcp
    out: proto/generated/go
    opt:
      - lang=go
      - module=github.com/the-protobuf-project/grpc-mcp-gateway/examples/proto/generated/go
  # --- Python ---
  - remote: buf.build/protocolbuffers/python
    out: proto/generated/python
  - remote: buf.build/grpc/python
    out: proto/generated/python
  - local: protoc-gen-mcp
    out: proto/generated/python
    opt:
      - lang=python
      - paths=source_relative
  # --- Rust ---
  - remote: buf.build/community/neoeinstein-prost
    out: proto/generated/rust
  - remote: buf.build/community/neoeinstein-tonic
    out: proto/generated/rust
  - local: protoc-gen-mcp
    out: proto/generated/rust
    opt:
      - lang=rust
      - paths=source_relative
  # --- C++ MCP bridge (header + cxx.rs) ---
  # strategy: all avoids duplicate shared outputs when multiple proto packages exist.
  - local: protoc-gen-mcp
    out: proto/generated/cpp
    strategy: all
    opt:
      - lang=cpp
      - paths=source_relative
