version: v2
modules:
  - path: .
    name: buf.build/the-protobuf-project/mcp
deps:
  - buf.build/googleapis/googleapis
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - ENUM_VALUE_PREFIX
    - COMMENT_ENUM_VALUE
    - COMMENT_ENUM
    # Files live under mcp/protobuf/ but declare `package mcp` (matching the
    # published buf.build/the-protobuf-project/mcp module), so the directory
    # intentionally does not match the package.
    - PACKAGE_DIRECTORY_MATCH
breaking:
  use:
    - FILE
