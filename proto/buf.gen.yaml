version: v2
plugins:
  # --- Go (pre-compiled, published as part of the Go module) ---
  # Only the Go types (mcppb) are pre-compiled and shipped from this repo; they
  # back the runtime package. Python/Rust/etc. annotation types are generated
  # client-side from the published Buf module (buf.build/the-protobuf-project/mcp).
  - local: protoc-gen-go
    out: ..
    opt:
      - module=github.com/the-protobuf-project/grpc-mcp-gateway
